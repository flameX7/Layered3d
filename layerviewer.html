<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    font-family: 'VT323', monospace;
  }

  #canvas-container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  canvas { display: block; }

  /* Layer counter top center */
  #layer-info {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    border: 2px solid #5a9e4a;
    padding: 8px 24px;
    color: #5a9e4a;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
  }

  #layer-info span {
    color: #a0e890;
  }

  /* Controls bottom center */
  #controls {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .arrow-btn {
    width: 56px;
    height: 56px;
    background: rgba(0,0,0,0.8);
    border: 2px solid #5a9e4a;
    color: #5a9e4a;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: monospace;
    image-rendering: pixelated;
  }

  .arrow-btn:hover:not(:disabled) {
    background: #5a9e4a;
    color: #000;
    transform: scale(1.08);
  }

  .arrow-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  /* Layer dots */
  #layer-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 10px;
    height: 10px;
    background: #333;
    border: 1px solid #5a9e4a44;
    cursor: pointer;
    transition: all 0.2s;
  }

  .dot.active {
    background: #5a9e4a;
    box-shadow: 0 0 8px #5a9e4a88;
  }

  .dot.filled {
    background: #2d5c25;
    border-color: #5a9e4a;
  }

  /* Loading overlay */
  #loading {
    position: absolute;
    inset: 0;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }

  #loading-text {
    font-family: 'Press Start 2P', monospace;
    color: #5a9e4a;
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  #loading-bar-outer {
    width: 240px;
    height: 16px;
    border: 2px solid #5a9e4a;
    background: #111;
  }

  #loading-bar-inner {
    height: 100%;
    background: #5a9e4a;
    width: 0%;
    transition: width 0.3s;
  }

  #loading-sub {
    font-family: 'VT323', monospace;
    color: #3a6e2a;
    font-size: 16px;
  }

  /* Hint */
  #hint {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    color: #3a5a32;
    font-family: 'VT323', monospace;
    font-size: 15px;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Error */
  #error-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #e05050;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    text-align: center;
    display: none;
    background: rgba(0,0,0,0.9);
    border: 2px solid #e05050;
    padding: 16px 24px;
    line-height: 2;
  }
</style>
</head>
<body>

<div id="canvas-container">
  <div id="loading">
    <div id="loading-text">LOADING LAYERS</div>
    <div id="loading-bar-outer"><div id="loading-bar-inner"></div></div>
    <div id="loading-sub">Preparing layer 1 of 6...</div>
  </div>

  <div id="layer-info">
    LAYER <span id="current-layer">1</span> / <span id="total-layers">6</span>
  </div>

  <div id="hint">drag to rotate · scroll to zoom</div>

  <div id="controls">
    <button class="arrow-btn" id="btn-prev" disabled>◀</button>
    <div id="layer-dots"></div>
    <button class="arrow-btn" id="btn-next">▶</button>
  </div>

  <div id="error-msg" id="error-msg"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const TOTAL_LAYERS = 6;
const BASE_URL = 'https://raw.githubusercontent.com/flameX7/Layered3d/main/';

// Scene setup
const scene = new THREE.Scene();
// background transparent via renderer alpha

const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// Camera
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(8, 8, 14);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 40;
controls.target.set(0, 2, 0);
controls.update();

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8899ff, 0.3);
fillLight.position.set(-10, 5, -10);
scene.add(fillLight);

// Grid
const gridHelper = new THREE.GridHelper(20, 20, 0x2a4a22, 0x1a2e14);
gridHelper.position.y = -0.01;
scene.add(gridHelper);

// State
let currentLayer = 0;
const loadedModels = [];
const layerGroups = [];

// Build dots
const dotsContainer = document.getElementById('layer-dots');
const dots = [];
for (let i = 0; i < TOTAL_LAYERS; i++) {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => goToLayer(i));
  dotsContainer.appendChild(dot);
  dots.push(dot);
}

// Load all layers upfront
const loader = new GLTFLoader();
const loadingBar = document.getElementById('loading-bar-inner');
const loadingSub = document.getElementById('loading-sub');
let loadedCount = 0;

async function loadLayer(index) {
  return new Promise((resolve, reject) => {
    const url = `${BASE_URL}layer${index + 1}.glb`;
    loader.load(
      url,
      (gltf) => {
        const group = new THREE.Group();
        gltf.scene.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            // Keep pixelated textures
            if (child.material && child.material.map) {
              child.material.map.magFilter = THREE.NearestFilter;
              child.material.map.minFilter = THREE.NearestFilter;
            }
          }
        });
        group.add(gltf.scene);
        group.visible = false;
        scene.add(group);
        layerGroups[index] = group;
        resolve();
      },
      undefined,
      reject
    );
  });
}

async function loadAll() {
  for (let i = 0; i < TOTAL_LAYERS; i++) {
    loadingSub.textContent = `Preparing layer ${i + 1} of ${TOTAL_LAYERS}...`;
    try {
      await loadLayer(i);
    } catch (e) {
      console.warn(`Layer ${i+1} failed to load:`, e);
      layerGroups[i] = null;
    }
    loadedCount++;
    loadingBar.style.width = `${(loadedCount / TOTAL_LAYERS) * 100}%`;
  }

  // Hide loading, show first layer
  document.getElementById('loading').style.display = 'none';
  showLayer(0);
}

function showLayer(index) {
  // Show all layers up to and including index (cumulative)
  for (let i = 0; i < TOTAL_LAYERS; i++) {
    if (layerGroups[i]) {
      layerGroups[i].visible = i <= index;
    }
  }

  currentLayer = index;

  // Update UI
  document.getElementById('current-layer').textContent = index + 1;

  // Update dots
  dots.forEach((dot, i) => {
    dot.classList.remove('active', 'filled');
    if (i === index) dot.classList.add('active');
    else if (i < index) dot.classList.add('filled');
  });

  // Update buttons
  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === TOTAL_LAYERS - 1;
}

function goToLayer(index) {
  if (index < 0 || index >= TOTAL_LAYERS) return;
  showLayer(index);
}

// Button listeners
document.getElementById('btn-prev').addEventListener('click', () => goToLayer(currentLayer - 1));
document.getElementById('btn-next').addEventListener('click', () => goToLayer(currentLayer + 1));

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowUp') goToLayer(currentLayer + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') goToLayer(currentLayer - 1);
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// Animate
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Start loading
loadAll();
</script>
</body>
</html>
